<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云转 - Hello World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }

        .container {
            text-align: center;
            padding: 60px 80px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            z-index: 10;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: default;
        }

        .container:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 3rem;
            color: #333;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: transform 0.3s ease;
        }

        .container:hover h1 {
            transform: scale(1.05);
        }

        .domain {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .status {
            display: inline-block;
            padding: 10px 30px;
            background: #10b981;
            color: white;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            animation: pulse 2s infinite;
            margin-bottom: 40px;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
            }
            50% {
                box-shadow: 0 0 0 15px rgba(16, 185, 129, 0);
            }
        }

        .footer {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }

        .counter {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .counter:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
        }

        .counter span {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .counter p {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .theme-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50px;
            font-size: 0.8rem;
            color: #666;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .typing-cursor {
            display: inline-block;
            width: 3px;
            height: 1em;
            background: #667eea;
            animation: blink 1s infinite;
            margin-left: 3px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .glow-effect {
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 5px rgba(102, 126, 234, 0.5),
                            0 0 10px rgba(102, 126, 234, 0.3),
                            0 0 15px rgba(102, 126, 234, 0.2);
            }
            to {
                box-shadow: 0 0 10px rgba(102, 126, 234, 0.8),
                            0 0 20px rgba(102, 126, 234, 0.5),
                            0 0 30px rgba(102, 126, 234, 0.3);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 30px;
                margin: 20px;
            }

            h1 {
                font-size: 2rem;
            }

            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="particles"></div>

    <div class="container">
        <h1><span id="greeting">Hello World</span><span class="typing-cursor"></span></h1>
        <p class="domain">🌐 <span id="domain-text">yunzhuan.icu</span></p>
        <div class="status">部署成功 ✓</div>
        <p class="footer">欢迎来到云转的世界</p>

        <div class="buttons">
            <button class="btn btn-primary" onclick="changeTheme('purple')">💜 紫色主题</button>
            <button class="btn btn-secondary" onclick="changeTheme('blue')">💙 蓝色主题</button>
            <button class="btn btn-success" onclick="changeTheme('green')">💚 绿色主题</button>
            <button class="btn btn-primary" onclick="resetTheme()">🔄 重置主题</button>
        </div>

        <div class="counter">
            <span id="click-count">0</span>
            <p>点击次数</p>
        </div>
    </div>

    <div class="theme-indicator" id="theme-indicator">当前主题：紫色渐变</div>

    <script>
        const themes = {
            purple: {
                gradient: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                text: '紫色渐变',
                particleColor: 'rgba(102, 126, 234, 0.6)'
            },
            blue: {
                gradient: 'linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%)',
                text: '蓝色渐变',
                particleColor: 'rgba(59, 130, 246, 0.6)'
            },
            green: {
                gradient: 'linear-gradient(135deg, #10b981 0%, #065f46 100%)',
                text: '绿色渐变',
                particleColor: 'rgba(16, 185, 129, 0.6)'
            }
        };

        let currentTheme = 'purple';
        let clickCount = 0;
        let particles = [];
        const particlesContainer = document.getElementById('particles');

        function changeTheme(theme) {
            currentTheme = theme;
            const themeData = themes[theme];
            document.body.style.background = themeData.gradient;
            document.getElementById('theme-indicator').textContent = `当前主题：${themeData.text}`;
            
            const h1 = document.querySelector('h1');
            h1.style.background = themeData.gradient;
            
            createExplosion();
        }

        function resetTheme() {
            changeTheme('purple');
        }

        function createExplosion() {
            const container = document.querySelector('.container');
            const rect = container.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.background = themes[currentTheme].particleColor;
                particlesContainer.appendChild(particle);

                const angle = (i / 20) * Math.PI * 2;
                const velocity = 3 + Math.random() * 5;
                const size = 4 + Math.random() * 6;

                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${centerX}px`;
                particle.style.top = `${centerY}px`;
                particle.style.opacity = '1';

                const animation = particle.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${Math.cos(angle) * velocity * 50}px, ${Math.sin(angle) * velocity * 50}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 800 + Math.random() * 400,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                });

                animation.onfinish = () => {
                    particle.remove();
                };
            }
        }

        let mouseX = 0;
        let mouseY = 0;
        let targetMouseX = 0;
        let targetMouseY = 0;

        document.addEventListener('mousemove', (e) => {
            targetMouseX = e.clientX;
            targetMouseY = e.clientY;
        });

        function createParticle() {
            if (Math.random() > 0.3) return;

            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.background = themes[currentTheme].particleColor;
            particlesContainer.appendChild(particle);

            const size = 3 + Math.random() * 5;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${mouseX}px`;
            particle.style.top = `${mouseY}px`;
            particle.style.opacity = '1';

            const angle = Math.random() * Math.PI * 2;
            const velocity = 2 + Math.random() * 4;

            const animation = particle.animate([
                { transform: 'translate(0, 0) scale(1)', opacity: 0.8 },
                { transform: `translate(${Math.cos(angle) * velocity * 30}px, ${Math.sin(angle) * velocity * 30}px) scale(0)`, opacity: 0 }
            ], {
                duration: 600 + Math.random() * 400,
                easing: 'ease-out'
            });

            animation.onfinish = () => {
                particle.remove();
            };
        }

        function animate() {
            mouseX += (targetMouseX - mouseX) * 0.1;
            mouseY += (targetMouseY - mouseY) * 0.1;
            createParticle();
            requestAnimationFrame(animate);
        }

        animate();

        document.querySelector('.container').addEventListener('click', () => {
            clickCount++;
            document.getElementById('click-count').textContent = clickCount;
        });

        const greetings = ['Hello World', '你好世界', 'こんにちは世界', 'Bonjour Monde'];
        let greetingIndex = 0;
        let charIndex = 0;
        const greetingElement = document.getElementById('greeting');

        function typeWriter() {
            if (charIndex < greetings[greetingIndex].length) {
                greetingElement.textContent += greetings[greetingIndex].charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, 100);
            } else {
                setTimeout(deleteWriter, 2000);
            }
        }

        function deleteWriter() {
            if (charIndex > 0) {
                greetingElement.textContent = greetings[greetingIndex].substring(0, charIndex - 1);
                charIndex--;
                setTimeout(deleteWriter, 50);
            } else {
                greetingIndex = (greetingIndex + 1) % greetings.length;
                setTimeout(typeWriter, 500);
            }
        }

        setTimeout(typeWriter, 1000);

        document.body.style.background = themes.purple.gradient;
    </script>
</body>
</html>
