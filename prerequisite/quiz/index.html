<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算机课程刷题 - yunzhuan.icu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .back-link {
            color: #667eea;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: inline-block;
        }
        .back-link:hover { text-decoration: underline; }
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1.6rem;
            text-align: center;
        }
        .subtitle {
            color: #888;
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        /* 课程选择 */
        .course-select {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .course-btn {
            padding: 10px 20px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .course-btn:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .course-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        /* 进度条 */
        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .progress-text {
            text-align: center;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 16px;
        }
        /* 题目区域 */
        .question-area {
            display: none;
        }
        .question-area.active {
            display: block;
        }
        .question-type {
            display: inline-block;
            padding: 4px 12px;
            background: #f0f4ff;
            color: #667eea;
            border-radius: 15px;
            font-size: 0.8rem;
            margin-bottom: 12px;
        }
        .question-text {
            font-size: 1.1rem;
            color: #333;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        /* 选项 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            padding: 14px 18px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        .option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .option.selected {
            border-color: #667eea;
            background: #e8eaf6;
        }
        .option.correct {
            border-color: #4caf50;
            background: #e8f5e9;
        }
        .option.wrong {
            border-color: #f44336;
            background: #ffebee;
        }
        /* 判断题按钮 */
        .judge-options {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .judge-btn {
            padding: 20px 50px;
            font-size: 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        /* 反馈区域 */
        .feedback {
            display: none;
            padding: 16px;
            border-radius: 12px;
            margin-top: 16px;
        }
        .feedback.show {
            display: block;
        }
        .feedback.correct {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
        }
        .feedback.wrong {
            background: #ffebee;
            border-left: 4px solid #f44336;
        }
        .feedback-title {
            font-weight: 600;
            margin-bottom: 8px;
        }
        .feedback-text {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        /* 按钮 */
        .btn-next {
            display: none;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn-next.show {
            display: block;
        }
        .btn-next:hover {
            transform: translateY(-2px);
        }
        /* 结果页面 */
        .result-area {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        .result-area.active {
            display: block;
        }
        .score {
            font-size: 4rem;
            font-weight: bold;
            color: #667eea;
        }
        .score-label {
            color: #888;
            margin-bottom: 20px;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }
        .stat-label {
            font-size: 0.85rem;
            color: #888;
        }
        .streak {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            color: white;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .btn-restart {
            padding: 14px 40px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-restart:hover {
            background: #764ba2;
        }
        /* 隐藏开始按钮 */
        .start-area {
            text-align: center;
            padding: 40px 20px;
        }
        .start-area.hidden {
            display: none;
        }
        .btn-start {
            padding: 16px 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-start:hover {
            transform: scale(1.05);
        }
        @media (max-width: 600px) {
            .judge-btn {
                padding: 15px 30px;
                font-size: 1rem;
            }
            .stats {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link">← 返回首页</a>
        
        <h1>💻 计算机课程刷题</h1>
        <p class="subtitle">Computer Science Quiz</p>

        <!-- 课程选择 -->
        <div class="course-select" id="courseSelect">
            <button class="course-btn active" data-course="all">全部课程</button>
            <button class="course-btn" data-course="数据结构">数据结构</button>
            <button class="course-btn" data-course="算法设计">算法设计</button>
            <button class="course-btn" data-course="操作系统">操作系统</button>
        </div>

        <!-- 开始页面 -->
        <div class="start-area" id="startArea">
            <p style="color:#666;margin-bottom:20px;">选择课程后点击开始答题</p>
            <button class="btn-start" onclick="startQuiz()">开始答题</button>
        </div>

        <!-- 答题区域 -->
        <div class="question-area" id="questionArea">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="progress-text" id="progressText">第 1 题 / 共 10 题</div>

            <div class="question-type" id="questionType">单选题</div>
            <div class="question-text" id="questionText"></div>

            <div class="options" id="optionsContainer"></div>

            <div class="feedback" id="feedback">
                <div class="feedback-title" id="feedbackTitle"></div>
                <div class="feedback-text" id="feedbackText"></div>
            </div>

            <button class="btn-next" id="btnNext" onclick="nextQuestion()">下一题 →</button>
        </div>

        <!-- 结果页面 -->
        <div class="result-area" id="resultArea">
            <div class="score" id="finalScore">0</div>
            <div class="score-label">正确率</div>
            
            <div class="streak" id="maxStreak"></div>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="correctCount">0</div>
                    <div class="stat-label">答对</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="wrongCount">0</div>
                    <div class="stat-label">答错</div>
                </div>
            </div>

            <button class="btn-restart" onclick="restartQuiz()">再来一次</button>
        </div>
    </div>

    <script>
        let questions = [];
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let streak = 0;
        let maxStreak = 0;
        let answered = false;
        let selectedCourse = 'all';

        // 加载题目
        async function loadQuestions() {
            const response = await fetch('data/questions.json');
            questions = await response.json();
        }

        // 课程选择
        document.querySelectorAll('.course-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.course-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedCourse = this.dataset.course;
            });
        });

        // 开始答题
        function startQuiz() {
            // 筛选题目
            if (selectedCourse === 'all') {
                currentQuestions = [...questions];
            } else {
                currentQuestions = questions.filter(q => q.course === selectedCourse);
            }
            
            // 随机取10题
            currentQuestions = shuffleArray(currentQuestions).slice(0, 10);
            
            currentIndex = 0;
            score = 0;
            streak = 0;
            maxStreak = 0;

            document.getElementById('startArea').classList.add('hidden');
            document.getElementById('questionArea').classList.add('active');
            document.getElementById('resultArea').classList.remove('active');
            
            showQuestion();
        }

        // 显示题目
        function showQuestion() {
            answered = false;
            const q = currentQuestions[currentIndex];
            
            // 更新进度
            const progress = ((currentIndex) / currentQuestions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `第 ${currentIndex + 1} 题 / 共 ${currentQuestions.length} 题`;
            
            // 显示题目
            document.getElementById('questionType').textContent = q.type === 'single' ? '单选题' : '判断题';
            document.getElementById('questionText').textContent = q.question;
            
            // 显示选项
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            if (q.type === 'single') {
                q.options.forEach((opt, idx) => {
                    const div = document.createElement('div');
                    div.className = 'option';
                    div.textContent = opt;
                    div.onclick = () => selectOption(idx, div);
                    container.appendChild(div);
                });
            } else {
                container.innerHTML = `
                    <div class="judge-options">
                        <div class="option judge-btn" onclick="selectJudge(true, this)">✓ 正确</div>
                        <div class="option judge-btn" onclick="selectJudge(false, this)">✗ 错误</div>
                    </div>
                `;
            }
            
            // 隐藏反馈和下一题按钮
            document.getElementById('feedback').classList.remove('show', 'correct', 'wrong');
            document.getElementById('btnNext').classList.remove('show');
        }

        // 选择单选选项
        function selectOption(idx, element) {
            if (answered) return;
            answered = true;
            
            const q = currentQuestions[currentIndex];
            const isCorrect = idx === q.answer;
            
            // 显示选择结果
            document.querySelectorAll('.option').forEach((opt, i) => {
                if (i === q.answer) {
                    opt.classList.add('correct');
                } else if (i === idx && !isCorrect) {
                    opt.classList.add('wrong');
                }
            });
            
            showFeedback(isCorrect, q.explanation);
        }

        // 选择判断题
        function selectJudge(answer, element) {
            if (answered) return;
            answered = true;
            
            const q = currentQuestions[currentIndex];
            const isCorrect = answer === q.answer;
            
            document.querySelectorAll('.judge-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            
            if (isCorrect) {
                element.classList.add('correct');
            } else {
                element.classList.add('wrong');
                document.querySelectorAll('.judge-btn').forEach(btn => {
                    if (btn.textContent.includes(q.answer ? '正确' : '错误')) {
                        btn.classList.add('correct');
                    }
                });
            }
            
            showFeedback(isCorrect, q.explanation);
        }

        // 显示反馈
        function showFeedback(isCorrect, explanation) {
            const feedback = document.getElementById('feedback');
            feedback.classList.add('show');
            
            if (isCorrect) {
                score++;
                streak++;
                if (streak > maxStreak) maxStreak = streak;
                feedback.classList.add('correct');
                document.getElementById('feedbackTitle').textContent = '🎉 答对了！';
            } else {
                streak = 0;
                feedback.classList.add('wrong');
                document.getElementById('feedbackTitle').textContent = '😅 答错了';
            }
            
            document.getElementById('feedbackText').textContent = explanation;
            document.getElementById('btnNext').classList.add('show');
            
            // 更新按钮文字
            if (currentIndex >= currentQuestions.length - 1) {
                document.getElementById('btnNext').textContent = '查看结果 →';
            } else {
                document.getElementById('btnNext').textContent = '下一题 →';
            }
        }

        // 下一题
        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= currentQuestions.length) {
                showResult();
            } else {
                showQuestion();
            }
        }

        // 显示结果
        function showResult() {
            document.getElementById('questionArea').classList.remove('active');
            document.getElementById('resultArea').classList.add('active');
            
            const percent = Math.round((score / currentQuestions.length) * 100);
            document.getElementById('finalScore').textContent = percent + '%';
            document.getElementById('correctCount').textContent = score;
            document.getElementById('wrongCount').textContent = currentQuestions.length - score;
            
            if (maxStreak >= 3) {
                document.getElementById('maxStreak').textContent = `🔥 最高连击 ${maxStreak}`;
            } else {
                document.getElementById('maxStreak').textContent = '';
            }
        }

        // 重新开始
        function restartQuiz() {
            document.getElementById('startArea').classList.remove('hidden');
            document.getElementById('questionArea').classList.remove('active');
            document.getElementById('resultArea').classList.remove('active');
        }

        // 洗牌算法
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 初始化
        loadQuestions();
    </script>
</body>
</html>
