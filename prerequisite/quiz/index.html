<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刷题</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  max-width: 720px;
  margin: 0 auto;
  padding: 16px;
  background: #f5f5f5;
  color: #333;
  min-height: 100vh;
}
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  font-size: 0.85rem;
  color: #666;
}
.back-link { color: #667eea; text-decoration: none; }
.back-link:hover { text-decoration: underline; }
.stat { color: #888; }
.stat b { color: #667eea; }

.progress-bar {
  background: #e0e0e0;
  border-radius: 10px;
  height: 8px;
  margin-bottom: 20px;
  overflow: hidden;
}
.progress-fill {
  background: linear-gradient(90deg, #667eea, #764ba2);
  height: 100%;
  border-radius: 10px;
  transition: width 0.3s ease;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.q-type {
  display: inline-block;
  padding: 3px 10px;
  background: #f0f4ff;
  color: #667eea;
  border-radius: 12px;
  font-size: 0.75rem;
  margin-bottom: 10px;
}
.q-text {
  font-size: 1.05rem;
  line-height: 1.6;
  margin-bottom: 12px;
  color: #222;
}
.tts-btn {
  display: inline-block;
  padding: 5px 12px;
  background: #f0f4ff;
  color: #667eea;
  border: 1px solid #667eea;
  border-radius: 14px;
  font-size: 0.8rem;
  cursor: pointer;
  margin-bottom: 16px;
  user-select: none;
}
.tts-btn:hover { background: #e8eaf6; }
.tts-btn.speaking { background: #667eea; color: white; }

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.option {
  padding: 12px 16px;
  background: #f8f9fa;
  border: 2px solid #e0e0e0;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 0.95rem;
  text-align: left;
  font-family: inherit;
  color: #333;
  width: 100%;
}
.option:hover { border-color: #667eea; background: #f0f4ff; }
.option.correct { border-color: #4caf50; background: #e8f5e9; }
.option.wrong { border-color: #f44336; background: #ffebee; }

.feedback {
  display: none;
  margin-top: 14px;
  padding: 12px;
  border-radius: 8px;
  font-size: 0.9rem;
}
.feedback.show { display: block; }
.feedback.right { background: #e8f5e9; color: #2e7d32; border-left: 3px solid #4caf50; }
.feedback.wrong { background: #ffebee; color: #c62828; border-left: 3px solid #f44336; }

/* 结果页 */
.result {
  text-align: center;
  padding: 30px 20px;
}
.score-circle {
  width: 140px;
  height: 140px;
  margin: 0 auto 16px;
  border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.4rem;
  font-weight: bold;
}
.score-text { color: #666; margin-bottom: 24px; }
.stats-row {
  display: flex;
  justify-content: space-around;
  margin: 24px 0;
  padding: 16px;
  background: #f8f9fa;
  border-radius: 10px;
}
.stat-item .v { font-size: 1.3rem; font-weight: bold; color: #333; }
.stat-item .l { font-size: 0.8rem; color: #888; }
.btn {
  display: inline-block;
  padding: 12px 32px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 22px;
  font-size: 0.95rem;
  cursor: pointer;
  text-decoration: none;
  margin: 6px;
  font-family: inherit;
}
.btn:hover { background: #764ba2; }
.btn.ghost { background: white; color: #667eea; border: 1px solid #667eea; }
.btn.ghost:hover { background: #f0f4ff; }

.empty { text-align: center; padding: 40px 20px; color: #888; }
</style>
<link rel="stylesheet" href="../css/user.css">
</head>
<body>

<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/user.js"></script>
<script src="js/tts.js"></script>
<script src="js/quiz-engine.js"></script>
<script>
const app = document.getElementById('app');
const params = new URLSearchParams(location.search);
const courseId = params.get('course') || '';

let questions = [];
let engine = null;

(async function() {
  try {
    const resp = await fetch('data/questions.json');
    questions = await resp.json();
  } catch (e) {
    app.innerHTML = '<div class="card empty">题目加载失败</div>';
    return;
  }

  // 找到当前课程名
  const courseQs = questions.filter(q => q.courseId === courseId);
  const courseName = courseQs.length > 0 ? courseQs[0].courseName : '全部';

  // 初始化引擎
  engine = new QuizEngine(questions, courseId);
  const count = engine.init(10);
  if (count === 0) {
    app.innerHTML = '<div class="card empty">该课程暂无题目</div>';
    return;
  }

  // 渲染第一题
  renderQuestion();
})();

function renderQuestion() {
  const q = engine.getCurrent();
  const prog = engine.getProgress();
  const user = Storage.getUser();
  const isLast = engine.currentIndex === engine.questions.length - 1;
  
  // 计算返回链接
  const backUrl = document.referrer && document.referrer.indexOf(location.host) > -1 
    ? 'javascript:history.back()' 
    : '../index.html';

  app.innerHTML = `
    <div class="top-bar">
      <a href="${backUrl}" class="back-link" onclick="return confirmExit()">退出</a>
      <span class="stat">${engine.currentIndex + 1} / ${engine.questions.length}</span>
      <span class="stat">金币 <b>${user.coin}</b> · ${user.level}级</span>
    </div>
    <div style="background:#f0f4ff;border-left:3px solid #667eea;padding:8px 12px;border-radius:6px;margin-bottom:12px;font-size:0.8rem;color:#555;">
        提示：按键盘 1-4 选择答案，按空格键朗读题干，答对可获得 1 金币。点击左上角"退出"可随时离开。
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${prog.percent}%"></div></div>
    <div class="card">
      <div class="q-type">${q.type === 'single' ? '单选题' : '判断题'}</div>
      <div class="q-text" id="qText">${q.question}</div>
      <button class="tts-btn" id="ttsBtn" type="button">朗读</button>
      <div class="options" id="opts"></div>
      <div class="feedback" id="fb"></div>
    </div>
  `;

  const optsBox = document.getElementById('opts');
  if (q.type === 'single') {
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option';
      btn.type = 'button';
      btn.innerHTML = `<b>${i+1}.</b> ${opt}`;
      btn.onclick = () => selectAnswer(i, btn);
      optsBox.appendChild(btn);
    });
  } else {
    optsBox.innerHTML = `
      <button class="option" type="button" onclick="selectJudge(true, this)"><b>1.</b> 正确</button>
      <button class="option" type="button" onclick="selectJudge(false, this)"><b>2.</b> 错误</button>
    `;
  }

  // 朗读按钮
  const ttsBtn = document.getElementById('ttsBtn');
  let speaking = false;
  ttsBtn.onclick = () => {
    if (speaking) {
      TTS.stop();
      ttsBtn.textContent = '朗读';
      ttsBtn.classList.remove('speaking');
      speaking = false;
    } else {
      TTS.speak(q.question, 'zh');
      ttsBtn.textContent = '停止';
      ttsBtn.classList.add('speaking');
      speaking = true;
      // 朗读完自动复位
      const interval = setInterval(() => {
        if (!speechSynthesis.speaking) {
          ttsBtn.textContent = '朗读';
          ttsBtn.classList.remove('speaking');
          speaking = false;
          clearInterval(interval);
        }
      }, 200);
    }
  };
}

function confirmExit() {
  return true;
}

function selectAnswer(idx, el) {
  if (engine.answered) return;
  const result = engine.answer(idx);
  if (!result) return;
  showFeedback(result, el);
}

function selectJudge(answer, el) {
  if (engine.answered) return;
  // 判断题:true=对(0),false=错(1)
  // q.answer 可能是 true 或 false
  const q = engine.getCurrent();
  const idx = answer === q.answer ? 0 : 1;
  const result = engine.answer(idx);
  showFeedback(result, el);
}

function showFeedback(result, el) {
  const q = result.q;
  const opts = document.querySelectorAll('.option');
  opts.forEach((opt, i) => {
    if (q.type === 'single') {
      if (i === q.answer) opt.classList.add('correct');
      else if (opt === el) opt.classList.add('wrong');
    } else {
      // 判断题
      const correct = q.answer;
      if ((correct && i === 0) || (!correct && i === 1)) opt.classList.add('correct');
      else if (opt === el) opt.classList.add('wrong');
    }
  });

  const fb = document.getElementById('fb');
  fb.classList.add('show');
  if (result.isCorrect) {
    fb.classList.add('right');
    fb.innerHTML = '答对了, +1 金币';
  } else {
    fb.classList.add('wrong');
    const correctText = q.type === 'single' ? q.options[q.answer] : (q.answer ? '正确' : '错误');
    fb.innerHTML = `答错了, 正确答案是: ${correctText}`;
  }

  // 停止朗读
  TTS.stop();

  // 1.5秒后自动下一题
  setTimeout(() => {
    const r = engine.next();
    if (r.done) {
      renderResult();
    } else {
      renderQuestion();
    }
  }, 1500);
}

function renderResult() {
  const result = engine.getResult();
  const user = saveResult(result);
  const courseName = result.courseId ? (questions.find(q => q.courseId === result.courseId) || {}).courseName || '' : '';

  app.innerHTML = `
    <div class="top-bar">
      <a href="javascript:history.back()" class="back-link">返回</a>
      <span class="stat">已完成</span>
      <span class="stat"></span>
    </div>
    <div class="card result">
      <div class="score-circle">${result.accuracy}%</div>
      <div class="score-text">${courseName ? courseName + ' · ' : ''}答对 ${result.correct} / ${result.total} 题</div>

      <div class="stats-row">
        <div class="stat-item">
          <div class="v">+${result.coinsEarned}</div>
          <div class="l">获得金币</div>
        </div>
        <div class="stat-item">
          <div class="v">${result.maxStreak}</div>
          <div class="l">最高连击</div>
        </div>
        <div class="stat-item">
          <div class="v">${user.level}</div>
          <div class="l">当前等级</div>
        </div>
        <div class="stat-item">
          <div class="v">${user.coin}</div>
          <div class="l">总金币</div>
        </div>
      </div>

      <a href="javascript:location.reload()" class="btn">再来一次</a>
      <a href="javascript:history.back()" class="btn ghost">返回课程</a>
      <a href="../index.html" class="btn ghost">浏览其他课程</a>
    </div>
  `;
}

// 键盘快捷键
document.addEventListener('keydown', (e) => {
  if (engine && engine.answered) return;
  if (['1','2','3','4'].includes(e.key)) {
    const idx = parseInt(e.key) - 1;
    const opts = document.querySelectorAll('.option');
    if (opts[idx]) opts[idx].click();
  } else if (e.key === ' ') {
    e.preventDefault();
    const btn = document.getElementById('ttsBtn');
    if (btn) btn.click();
  }
});
</script>

<!-- enhanced-links -->
<script src="../js/user.js"></script>
</body>
</html>
